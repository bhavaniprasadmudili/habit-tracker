<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trackkar Habit Tracker</title>
  
  <!-- Premium Fonts for Elegant Editorial Feel -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Instrument Serif"', 'serif'],
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel for JSX Compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Premium thin scrollbar styles */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #e2e8f0;
      border-radius: 9999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #cbd5e1;
    }
    
    /* Elegant pulse animations */
    @keyframes subtle-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.03); opacity: 0.95; }
    }
    .pulse-glow {
      animation: subtle-pulse 3s infinite ease-in-out;
    }
  </style>
</head>
<body class="bg-[#F4F4F6] text-slate-800 font-sans min-h-screen flex items-center justify-center p-0 sm:p-4">

  <!-- Main Mount Container with a Mock Smartphone Shell on Desktop, Borderless on Mobile -->
  <div id="root" class="w-full max-w-[430px] sm:h-[880px] bg-[#FBFBFD] sm:rounded-[40px] sm:shadow-[0_24px_60px_-15px_rgba(0,0,0,0.15)] overflow-hidden flex flex-col relative border-0 sm:border-[8px] sm:border-slate-900"></div>

  <!-- React Code Implementation -->
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // Default aesthetic quotes for mindfulness
    const MOTIVATIONAL_QUOTES = [
      "Trust the process. Focused, intentional, and ready for the month ahead.",
      "Consistency beats intensity. Small daily improvements lead to stunning results.",
      "Your future self is thanking you for what you are doing right now.",
      "One checkmark at a time. Cultivate space for growth, not perfection.",
      "Energy flows where attention goes. Choose your habits with intention."
    ];

    // Initial pre-populated habits with modern minimalist icons (Start with pristine, clean empty logs!)
    const INITIAL_HABITS = [
      { id: '1', name: 'Read 1 Hour', icon: '📖' },
      { id: '2', name: 'Stop Doomscrolling', icon: '📱' },
      { id: '3', name: 'Workout', icon: '💪' },
      { id: '4', name: 'Eat Clean', icon: '🥗' },
      { id: '5', name: 'Go Out in Nature', icon: '🌲' },
      { id: '6', name: 'Wake Up Early', icon: '☀️' },
      { id: '7', name: 'Drink 3L Water', icon: '💧' },
      { id: '8', name: 'Learn Spanish', icon: '🇪🇸' }
    ];

    // Themes for Weeks 1 to 5 to keep the layout colorfully structured & visually delightful
    const WEEK_THEMES = [
      { 
        id: 0, 
        name: 'Week 1', 
        primary: '#90CAF9', 
        secondary: '#1E88E5', 
        bg: 'bg-blue-50/70', 
        border: 'border-blue-100', 
        accent: 'bg-blue-100/50', 
        text: 'text-blue-700',
        fill: 'bg-blue-400',
        gradient: 'from-blue-100 to-indigo-100'
      },
      { 
        id: 1, 
        name: 'Week 2', 
        primary: '#F48FB1', 
        secondary: '#D81B60', 
        bg: 'bg-rose-50/70', 
        border: 'border-rose-100', 
        accent: 'bg-rose-100/50', 
        text: 'text-rose-700',
        fill: 'bg-rose-400',
        gradient: 'from-rose-100 to-pink-100'
      },
      { 
        id: 2, 
        name: 'Week 3', 
        primary: '#A5D6A7', 
        secondary: '#2E7D32', 
        bg: 'bg-emerald-50/70', 
        border: 'border-emerald-100', 
        accent: 'bg-emerald-100/50', 
        text: 'text-emerald-700',
        fill: 'bg-emerald-400',
        gradient: 'from-emerald-100 to-teal-100'
      },
      { 
        id: 3, 
        name: 'Week 4', 
        primary: '#FFE082', 
        secondary: '#F57F17', 
        bg: 'bg-amber-50/70', 
        border: 'border-amber-100', 
        accent: 'bg-amber-100/50', 
        text: 'text-amber-800',
        fill: 'bg-amber-400',
        gradient: 'from-amber-100 to-orange-100'
      },
      { 
        id: 4, 
        name: 'Week 5', 
        primary: '#CE93D8', 
        secondary: '#6A1B9A', 
        bg: 'bg-purple-50/70', 
        border: 'border-purple-100', 
        accent: 'bg-purple-100/50', 
        text: 'text-purple-700',
        fill: 'bg-purple-400',
        gradient: 'from-purple-100 to-fuchsia-100'
      }
    ];

    const DAYS_OF_WEEK = [
      { name: 'M', label: 'Mon' },
      { name: 'T', label: 'Tue' },
      { name: 'W', label: 'Wed' },
      { name: 'T', label: 'Thu' },
      { name: 'F', label: 'Fri' },
      { name: 'S', label: 'Sat' },
      { name: 'S', label: 'Sun' }
    ];

    function App() {
      // Audio Context for premium satisfaction sound effect
      const playPopSound = (isCheck) => {
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          const ctx = new AudioContext();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          
          osc.type = 'sine';
          osc.frequency.setValueAtTime(isCheck ? 587.33 : 293.66, ctx.currentTime); // D5 or D4
          
          if (isCheck) {
            osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1); // Slide up to A5
          } else {
            osc.frequency.exponentialRampToValueAtTime(220, ctx.currentTime + 0.1); // Slide down
          }

          gain.gain.setValueAtTime(0.15, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
          
          osc.connect(gain);
          gain.connect(ctx.destination);
          
          osc.start();
          osc.stop(ctx.currentTime + 0.15);
        } catch (e) {
          // Fallback if browser audio blocks
        }
      };

      // State variables
      const [habits, setHabits] = useState(() => {
        const saved = localStorage.getItem('trackkar_habits');
        return saved ? JSON.parse(saved) : INITIAL_HABITS;
      });

      // Grid state: { [habitId]: { [weekIndex]: { [dayIndex]: boolean } } }
      // CLEAN INITAL STATE: No "face numbers" or fake prepopulated checkmarks! All default to false.
      const [grid, setGrid] = useState(() => {
        const saved = localStorage.getItem('trackkar_grid');
        if (saved) return JSON.parse(saved);

        const initialGrid = {};
        INITIAL_HABITS.forEach((h) => {
          initialGrid[h.id] = {};
          for (let w = 0; w < 5; w++) {
            initialGrid[h.id][w] = {};
            for (let d = 0; d < 7; d++) {
              initialGrid[h.id][w][d] = false;
            }
          }
        });
        return initialGrid;
      });

      const [selectedWeekIdx, setSelectedWeekIdx] = useState(0);
      const [selectedDayIdx, setSelectedDayIdx] = useState(new Date().getDay() === 0 ? 6 : new Date().getDay() - 1); // 0-6 (Mon-Sun)
      const [newHabitName, setNewHabitName] = useState('');
      const [newHabitEmoji, setNewHabitEmoji] = useState('✨');
      const [quoteIndex, setQuoteIndex] = useState(0);
      const [isAddingHabit, setIsAddingHabit] = useState(false);
      const [showInfoModal, setShowInfoModal] = useState(false);

      // Save to LocalStorage
      useEffect(() => {
        localStorage.setItem('trackkar_habits', JSON.stringify(habits));
      }, [habits]);

      useEffect(() => {
        localStorage.setItem('trackkar_grid', JSON.stringify(grid));
      }, [grid]);

      // Cycle quotes
      const handleQuoteChange = () => {
        setQuoteIndex((prev) => (prev + 1) % MOTIVATIONAL_QUOTES.length);
      };

      // Reset all progress data back to absolute pristine state
      const handleResetAllProgress = () => {
        const cleanGrid = {};
        habits.forEach((h) => {
          cleanGrid[h.id] = {};
          for (let w = 0; w < 5; w++) {
            cleanGrid[h.id][w] = {};
            for (let d = 0; d < 7; d++) {
              cleanGrid[h.id][w][d] = false;
            }
          }
        });
        setGrid(cleanGrid);
        playPopSound(false);
        setShowInfoModal(false);
      };

      // Add a custom new habit
      const handleAddHabit = (e) => {
        e.preventDefault();
        if (!newHabitName.trim()) return;
        
        const newId = Date.now().toString();
        const newHabit = {
          id: newId,
          name: newHabitName.trim(),
          icon: newHabitEmoji
        };

        setHabits([...habits, newHabit]);
        
        // Initialize grid spaces for this new habit cleanly as false
        setGrid(prev => {
          const updated = { ...prev };
          updated[newId] = {};
          for (let w = 0; w < 5; w++) {
            updated[newId][w] = {};
            for (let d = 0; d < 7; d++) {
              updated[newId][w][d] = false;
            }
          }
          return updated;
        });

        setNewHabitName('');
        setNewHabitEmoji('✨');
        setIsAddingHabit(false);
        playPopSound(true);
      };

      // Delete a habit
      const handleDeleteHabit = (id) => {
        setHabits(habits.filter(h => h.id !== id));
        setGrid(prev => {
          const updated = { ...prev };
          delete updated[id];
          return updated;
        });
        playPopSound(false);
      };

      // Toggle grid cell
      const toggleCell = (habitId, weekIdx, dayIdx) => {
        const isCurrentlyChecked = !!grid[habitId]?.[weekIdx]?.[dayIdx];
        setGrid(prev => {
          const updated = { ...prev };
          if (!updated[habitId]) updated[habitId] = {};
          if (!updated[habitId][weekIdx]) updated[habitId][weekIdx] = {};
          updated[habitId][weekIdx][dayIdx] = !isCurrentlyChecked;
          return updated;
        });
        playPopSound(!isCurrentlyChecked);
      };

      // Realtime Calculated Metrics
      const totalPossibleCheckmarks = useMemo(() => {
        return habits.length * 35; // 5 weeks * 7 days
      }, [habits]);

      const totalCompletedCheckmarks = useMemo(() => {
        let count = 0;
        habits.forEach(h => {
          for (let w = 0; w < 5; w++) {
            for (let d = 0; d < 7; d++) {
              if (grid[h.id]?.[w]?.[d]) count++;
            }
          }
        });
        return count;
      }, [habits, grid]);

      // Focus day completion (Active Week + Active Focus Day)
      const focusDayProgress = useMemo(() => {
        if (habits.length === 0) return 0;
        let count = 0;
        habits.forEach(h => {
          if (grid[h.id]?.[selectedWeekIdx]?.[selectedDayIdx]) count++;
        });
        return (count / habits.length) * 100;
      }, [habits, grid, selectedWeekIdx, selectedDayIdx]);

      // Focus day ratio
      const focusDayRatio = useMemo(() => {
        let count = 0;
        habits.forEach(h => {
          if (grid[h.id]?.[selectedWeekIdx]?.[selectedDayIdx]) count++;
        });
        return { completed: count, total: habits.length };
      }, [habits, grid, selectedWeekIdx, selectedDayIdx]);

      // Total overall monthly completion rate
      const overallCompletionRate = useMemo(() => {
        if (totalPossibleCheckmarks === 0) return 0;
        return (totalCompletedCheckmarks / totalPossibleCheckmarks) * 100;
      }, [totalCompletedCheckmarks, totalPossibleCheckmarks]);

      // Success rate for each individual habit (calculated over all 35 days)
      const habitMetrics = useMemo(() => {
        return habits.map(h => {
          let count = 0;
          for (let w = 0; w < 5; w++) {
            for (let d = 0; d < 7; d++) {
              if (grid[h.id]?.[w]?.[d]) count++;
            }
          }
          const successRate = 35 > 0 ? (count / 35) * 100 : 0;
          return {
            ...h,
            count,
            successRate: parseFloat(successRate.toFixed(1))
          };
        }).sort((a, b) => b.successRate - a.successRate);
      }, [habits, grid]);

      // Day-by-day progress list for the selected week's bar chart
      const selectedWeekDayStats = useMemo(() => {
        return DAYS_OF_WEEK.map((day, dIdx) => {
          if (habits.length === 0) return 0;
          let count = 0;
          habits.forEach(h => {
            if (grid[h.id]?.[selectedWeekIdx]?.[dIdx]) count++;
          });
          return (count / habits.length) * 100;
        });
      }, [habits, grid, selectedWeekIdx]);

      // Multi-week trend rates for the top momentum line/wave chart
      const weeklyTrends = useMemo(() => {
        return WEEK_THEMES.map(weekTheme => {
          if (habits.length === 0) return 0;
          let count = 0;
          habits.forEach(h => {
            for (let d = 0; d < 7; d++) {
              if (grid[h.id]?.[weekTheme.id]?.[d]) count++;
            }
          });
          return (count / (habits.length * 7)) * 100;
        });
      }, [habits, grid]);

      const currentTheme = WEEK_THEMES[selectedWeekIdx];

      return (
        <div className="flex-1 flex flex-col h-full overflow-hidden relative bg-[#FAF9F5]">
          
          {/* Mock Mobile Status Bar (Visual Delight) */}
          <div className="flex justify-between items-center px-6 pt-3 pb-1 text-xs text-slate-500 font-medium select-none">
            <span>13:37</span>
            <div className="flex items-center space-x-1.5">
              <svg className="w-3.5 h-3.5 fill-current" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9 0 2.12.74 4.07 1.97 5.61L4.35 19.4c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l1.9-1.9C9.13 19.58 10.53 20 12 20c4.97 0 9-4.03 9-9s-4.03-9-9-9zm0 15c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/></svg>
              <svg className="w-3.5 h-3.5 fill-current" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
              <span className="text-[10px] bg-slate-200 px-1 rounded">100%</span>
            </div>
          </div>

          {/* App Header */}
          <header className="px-5 py-2 flex justify-between items-center border-b border-slate-100 bg-white/70 backdrop-blur-md sticky top-0 z-10">
            <div className="flex flex-col">
              <span className="text-[11px] font-bold tracking-[0.18em] text-slate-400 uppercase">trackkar.store</span>
              <h1 className="text-xl font-bold font-serif tracking-tight text-slate-800 flex items-center">
                Mindful Habits
                <span className="ml-1.5 text-xs font-sans font-normal px-2 py-0.5 rounded-full bg-slate-100 text-slate-600">May</span>
              </h1>
            </div>
            <div className="flex space-x-2">
              <button 
                onClick={() => setShowInfoModal(true)} 
                className="w-8 h-8 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-100 transition-colors"
                title="About & Settings"
              >
                <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
              </button>
              <button 
                onClick={() => setIsAddingHabit(true)}
                className="w-8 h-8 rounded-full bg-slate-900 text-white flex items-center justify-center hover:bg-slate-800 transition-colors shadow-sm"
                title="Add New Habit"
              >
                <svg className="w-4.5 h-4.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4.5v15m7.5-7.5h-15"></path></svg>
              </button>
            </div>
          </header>

          {/* Scrollable Main Area */}
          <main className="flex-1 overflow-y-auto px-5 pb-8 pt-4 space-y-6">

            {/* Overall Monthly Momentum Wave/Line Chart */}
            <div className="bg-white rounded-2xl p-4 border border-slate-100/80 shadow-xs">
              <div className="flex justify-between items-center mb-3">
                <div className="flex items-center space-x-1.5">
                  <span className="text-emerald-500 text-sm">📈</span>
                  <span className="text-xs font-bold text-slate-400 tracking-wider uppercase">Monthly Trend Momentum</span>
                </div>
                <span className="text-[11px] font-medium text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full">
                  Avg: {overallCompletionRate.toFixed(1)}%
                </span>
              </div>
              
              {/* SVG Smooth Curve Wave Representation */}
              <div className="relative h-16 w-full mt-2 select-none">
                <svg className="w-full h-full" viewBox="0 0 340 70" preserveAspectRatio="none">
                  <defs>
                    <linearGradient id="wave-gradient" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor={currentTheme.primary} stopOpacity="0.4"/>
                      <stop offset="100%" stopColor="#FFFFFF" stopOpacity="0"/>
                    </linearGradient>
                  </defs>
                  
                  {/* Grid Lines */}
                  <line x1="0" y1="10" x2="340" y2="10" stroke="#f1f5f9" strokeWidth="1" strokeDasharray="3 3" />
                  <line x1="0" y1="35" x2="340" y2="35" stroke="#f1f5f9" strokeWidth="1" strokeDasharray="3 3" />
                  <line x1="0" y1="60" x2="340" y2="60" stroke="#f1f5f9" strokeWidth="1" strokeDasharray="3 3" />

                  {/* Wave Line & Gradient Area */}
                  {/* Map index 0-4 (5 weeks) into 340 width */}
                  {(() => {
                    const points = weeklyTrends.map((val, idx) => {
                      const x = (idx * 80) + 10;
                      const y = 60 - (val * 0.5); // Scaled
                      return { x, y };
                    });

                    if (points.length < 2) return null;

                    // Generate a nice smooth bezier path string
                    let pathStr = `M ${points[0].x} ${points[0].y}`;
                    for (let i = 0; i < points.length - 1; i++) {
                      const p0 = points[i];
                      const p1 = points[i + 1];
                      const cpX1 = p0.x + 30;
                      const cpY1 = p0.y;
                      const cpX2 = p1.x - 30;
                      const cpY2 = p1.y;
                      pathStr += ` C ${cpX1} ${cpY1}, ${cpX2} ${cpY2}, ${p1.x} ${p1.y}`;
                    }

                    const closedPath = `${pathStr} L ${points[points.length-1].x} 70 L ${points[0].x} 70 Z`;

                    return (
                      <React.Fragment>
                        <path d={closedPath} fill="url(#wave-gradient)" />
                        <path d={pathStr} fill="none" stroke={currentTheme.secondary} strokeWidth="2.5" strokeLinecap="round" />
                        {/* Interactive Nodes */}
                        {points.map((p, i) => (
                          <g key={i} className="cursor-pointer" onClick={() => setSelectedWeekIdx(i)}>
                            <circle cx={p.x} cy={p.y} r="5" fill="#FFFFFF" stroke={WEEK_THEMES[i].secondary} strokeWidth="2.5" />
                            <circle cx={p.x} cy={p.y} r="8" fill={WEEK_THEMES[i].primary} fillOpacity="0.2" className="hover:scale-125 transition-transform" />
                          </g>
                        ))}
                      </React.Fragment>
                    );
                  })()}
                </svg>
              </div>
              <div className="flex justify-between text-[10px] text-slate-400 font-semibold px-2 mt-1">
                {WEEK_THEMES.map((t, idx) => (
                  <button 
                    key={idx} 
                    onClick={() => setSelectedWeekIdx(idx)}
                    className={`transition-all ${selectedWeekIdx === idx ? 'text-slate-800 font-bold scale-110' : 'hover:text-slate-600'}`}
                  >
                    W{idx+1} ({weeklyTrends[idx].toFixed(0)}%)
                  </button>
                ))}
              </div>
            </div>

            {/* Top Summary Header Card: Dynamic Focus & Cumulative stats */}
            <div className="bg-[#FFF1F2] rounded-3xl p-5 border border-rose-100 shadow-sm relative overflow-hidden pulse-glow">
              <div className="absolute right-[-10px] top-[-10px] w-24 h-24 bg-rose-200/20 rounded-full blur-2xl"></div>
              
              <div className="flex justify-between items-center">
                {/* Left Side: Daily completion rate */}
                <div>
                  <span className="text-[10px] font-bold tracking-[0.15em] text-rose-500 uppercase">
                    FOCUS DAY PROGRESS ({DAYS_OF_WEEK[selectedDayIdx].label})
                  </span>
                  <div className="flex items-baseline mt-1 space-x-1">
                    <span className="text-4xl font-extrabold font-serif italic text-slate-800">
                      {focusDayProgress.toFixed(1)}%
                    </span>
                  </div>
                  <p className="text-[11px] text-slate-500 mt-1 max-w-[190px]">
                    Tap day abbreviations in the grid row to change your active day focus.
                  </p>
                </div>

                {/* Right Side: Circular progress ring representing overall Monthly goals */}
                <div className="flex flex-col items-center">
                  <span className="text-[9px] font-bold tracking-[0.1em] text-slate-400 uppercase mb-2">
                    MONTHLY GOAL
                  </span>
                  <div className="relative w-20 h-20 flex items-center justify-center">
                    <svg className="w-full h-full transform -rotate-90">
                      <circle 
                        cx="40" 
                        cy="40" 
                        r="32" 
                        className="stroke-white" 
                        strokeWidth="7" 
                        fill="transparent" 
                      />
                      <circle 
                        cx="40" 
                        cy="40" 
                        r="32" 
                        className="stroke-rose-300 transition-all duration-700 ease-out" 
                        strokeWidth="7" 
                        fill="transparent" 
                        strokeDasharray={2 * Math.PI * 32}
                        strokeDashoffset={2 * Math.PI * 32 * (1 - (overallCompletionRate / 100))}
                        strokeLinecap="round"
                      />
                    </svg>
                    <div className="absolute flex flex-col items-center justify-center">
                      <span className="text-xs font-bold text-slate-800">
                        {totalCompletedCheckmarks}
                      </span>
                      <div className="w-6 border-b border-slate-300 my-0.5"></div>
                      <span className="text-[9px] font-bold text-slate-400">
                        {totalPossibleCheckmarks}
                      </span>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* Intention Card - Interactive Quote of the day */}
            <div 
              onClick={handleQuoteChange}
              className="bg-slate-50 border border-slate-100 rounded-2xl p-4 flex items-start space-x-3 cursor-pointer hover:bg-slate-100/50 transition-colors"
            >
              <span className="text-2xl text-rose-300 leading-none select-none">“</span>
              <div className="flex-1">
                <p className="text-xs italic text-slate-600 leading-relaxed font-serif">
                  {MOTIVATIONAL_QUOTES[quoteIndex]}
                </p>
                <div className="flex justify-between items-center mt-2">
                  <span className="text-[9px] uppercase tracking-wider text-slate-400 font-bold">Tap to rotate quote</span>
                  <span className="text-[10px] text-slate-500 font-medium">— trackkar.store</span>
                </div>
              </div>
            </div>

            {/* Matrix Segment Header & Week Navigation Controls */}
            <div>
              <div className="flex justify-between items-center mb-3">
                <h3 className="text-xs font-extrabold tracking-wider text-slate-400 uppercase">
                  Daily Matrix Grid
                </h3>
                <span className="text-[11px] font-bold text-slate-500">
                  {habits.length} Habits Active
                </span>
              </div>

              {/* Horizontal Week Switcher Tabs */}
              <div className="grid grid-cols-5 gap-1.5 p-1 bg-slate-100/80 rounded-xl mb-3">
                {WEEK_THEMES.map((theme, idx) => (
                  <button
                    key={theme.id}
                    onClick={() => {
                      setSelectedWeekIdx(idx);
                      playPopSound(true);
                    }}
                    className={`py-2 text-[10px] font-extrabold tracking-wider rounded-lg uppercase transition-all ${
                      selectedWeekIdx === idx 
                        ? 'bg-white shadow-xs text-slate-900 font-black' 
                        : 'text-slate-400 hover:text-slate-600'
                    }`}
                  >
                    W{idx+1}
                  </button>
                ))}
              </div>

              {/* Dynamic Grid Layout */}
              {habits.length === 0 ? (
                <div className="bg-white border border-slate-100 rounded-2xl p-8 text-center">
                  <span className="text-3xl block mb-2">🧘</span>
                  <p className="text-sm font-medium text-slate-500">No habits added yet.</p>
                  <button 
                    onClick={() => setIsAddingHabit(true)} 
                    className="mt-3 text-xs bg-slate-900 text-white px-3 py-1.5 rounded-full font-bold hover:bg-slate-800 transition-all"
                  >
                    + Add New Habit
                  </button>
                </div>
              ) : (
                <div className="bg-white rounded-2xl border border-slate-100/90 shadow-sm overflow-hidden">
                  <div className="overflow-x-auto">
                    <table className="w-full border-collapse">
                      <thead>
                        <tr className={`${currentTheme.bg} border-b border-slate-100 transition-colors duration-300`}>
                          <th className="p-3 text-left text-[11px] font-extrabold text-slate-500 uppercase w-[130px] min-w-[130px]">Habits</th>
                          {DAYS_OF_WEEK.map((day, dIdx) => (
                            <th key={dIdx} className="p-2 text-center w-[30px] min-w-[30px]">
                              <button 
                                onClick={() => setSelectedDayIdx(dIdx)}
                                className={`text-[10px] font-extrabold w-6 h-6 rounded-full flex items-center justify-center transition-all ${
                                  selectedDayIdx === dIdx 
                                    ? 'bg-slate-900 text-white shadow-xs scale-110 font-black' 
                                    : 'text-slate-500 hover:bg-slate-200/50'
                                }`}
                                title={`Set focus to ${day.label}`}
                              >
                                {day.name}
                              </button>
                            </th>
                          ))}
                          <th className="p-2 text-center text-[9px] font-extrabold text-slate-400 uppercase w-[40px] min-w-[40px]">%</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-50">
                        {habits.map((habit) => {
                          // Calc weekly rate for this habit
                          let checksThisWeek = 0;
                          for(let d=0; d<7; d++) {
                            if(grid[habit.id]?.[selectedWeekIdx]?.[d]) checksThisWeek++;
                          }
                          const weekSuccessPct = Math.round((checksThisWeek / 7) * 100);

                          return (
                            <tr key={habit.id} className="hover:bg-slate-50/50 transition-colors group">
                              <td className="p-3 flex items-center justify-between">
                                <div className="flex items-center space-x-2 min-w-0">
                                  <span className="text-base select-none leading-none">{habit.icon}</span>
                                  <span className="text-[12px] font-semibold text-slate-700 truncate" title={habit.name}>
                                    {habit.name}
                                  </span>
                                </div>
                                <button 
                                  onClick={() => handleDeleteHabit(habit.id)}
                                  className="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-rose-500 p-0.5 rounded transition-all ml-1"
                                  title="Delete Habit"
                                >
                                  <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                              </td>
                              
                              {/* 7 Checkbox Inputs */}
                              {DAYS_OF_WEEK.map((_, dIdx) => {
                                const isChecked = !!grid[habit.id]?.[selectedWeekIdx]?.[dIdx];
                                return (
                                  <td key={dIdx} className="p-1 text-center">
                                    <button
                                      onClick={() => toggleCell(habit.id, selectedWeekIdx, dIdx)}
                                      className={`w-6 h-6 rounded-md mx-auto flex items-center justify-center transition-all duration-300 relative ${
                                        isChecked 
                                          ? `${currentTheme.fill} border-transparent text-white scale-110 shadow-xs` 
                                          : 'border border-slate-200 hover:border-slate-300 text-transparent'
                                      }`}
                                      style={{
                                        backgroundColor: isChecked ? currentTheme.primary : 'transparent',
                                        borderColor: isChecked ? currentTheme.secondary : ''
                                      }}
                                    >
                                      <svg className={`w-3.5 h-3.5 stroke-white fill-none transition-transform duration-200 ${isChecked ? 'scale-100' : 'scale-0'}`} strokeWidth="3" viewBox="0 0 24 24">
                                        <polyline points="20 6 9 17 4 12"></polyline>
                                      </svg>
                                    </button>
                                  </td>
                                );
                              })}

                              {/* Habit Success Indicator on Grid Column Edge */}
                              <td className="p-2 text-center">
                                <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${
                                  weekSuccessPct > 70 
                                    ? 'bg-emerald-50 text-emerald-600' 
                                    : weekSuccessPct > 30 
                                    ? 'bg-amber-50 text-amber-700' 
                                    : 'bg-slate-100 text-slate-500'
                                }`}>
                                  {weekSuccessPct}%
                                </span>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                  <div className={`p-2 text-center text-[11px] font-bold border-t border-slate-50 transition-colors ${currentTheme.text} ${currentTheme.bg}`}>
                    * Tap a grid tile to mark it done. Click on a habit row to access custom deletion.
                  </div>
                </div>
              )}
            </div>

            {/* Weekly Momentum Analytics Chart (Interactive Bar Chart) */}
            <div className="bg-white rounded-2xl p-5 border border-slate-100/80 shadow-xs">
              <div className="flex justify-between items-center mb-4">
                <div className="flex items-center space-x-1.5">
                  <span className="text-indigo-500 text-sm">📊</span>
                  <span className="text-xs font-bold text-slate-400 tracking-wider uppercase">Weekly Analytics</span>
                </div>
                <span className="text-[10px] text-slate-400 font-bold tracking-wider uppercase">
                  {currentTheme.name} Completion
                </span>
              </div>

              {/* Chart Component Area */}
              <div className="h-32 flex items-end justify-between px-2 pt-2 border-b border-slate-100">
                {selectedWeekDayStats.map((pct, idx) => {
                  const isFocus = selectedDayIdx === idx;
                  return (
                    <div 
                      key={idx} 
                      onClick={() => setSelectedDayIdx(idx)}
                      className="flex-1 flex flex-col items-center group cursor-pointer"
                    >
                      {/* Bar tooltip / Value popup */}
                      <span className={`text-[10px] font-bold text-slate-600 mb-1 opacity-0 group-hover:opacity-100 transition-opacity ${isFocus ? 'opacity-100 text-slate-900' : ''}`}>
                        {pct.toFixed(0)}%
                      </span>
                      {/* Active bar color mapped to dynamic themes */}
                      <div 
                        className={`w-6 rounded-t-md transition-all duration-500 ease-out ${
                          isFocus ? 'opacity-100 shadow-xs scale-x-110' : 'opacity-70 group-hover:opacity-90'
                        }`}
                        style={{ 
                          height: `${Math.max(pct, 5)}%`, // Minimum height for viz representation
                          backgroundColor: isFocus ? currentTheme.secondary : currentTheme.primary
                        }}
                      ></div>
                    </div>
                  );
                })}
              </div>
              
              {/* Day labels mapping */}
              <div className="flex justify-between px-2 mt-2">
                {DAYS_OF_WEEK.map((day, idx) => (
                  <button 
                    key={idx} 
                    onClick={() => setSelectedDayIdx(idx)}
                    className={`flex-1 text-[10px] text-center font-extrabold transition-all ${
                      selectedDayIdx === idx ? 'text-slate-800 scale-110 font-black' : 'text-slate-400 hover:text-slate-600'
                    }`}
                  >
                    {day.label}
                  </button>
                ))}
              </div>
            </div>

            {/* Top Habits Leaderboard / List sorted by progress */}
            <div className="bg-white rounded-2xl p-5 border border-slate-100/80 shadow-xs">
              <div className="flex justify-between items-center mb-3">
                <div className="flex items-center space-x-1.5">
                  <span className="text-yellow-500 text-sm">🏆</span>
                  <span className="text-xs font-bold text-slate-400 tracking-wider uppercase">Habit Power Rankings</span>
                </div>
                <span className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">35-Day Rate</span>
              </div>

              {habits.length === 0 ? (
                <p className="text-xs text-slate-400 italic text-center py-4">Add habits to generate Power Rankings.</p>
              ) : (
                <div className="space-y-3">
                  {habitMetrics.slice(0, 10).map((habit, index) => (
                    <div key={habit.id} className="flex items-center justify-between">
                      <div className="flex items-center space-x-2.5 min-w-0 flex-1">
                        <span className="text-[10px] font-bold text-slate-300 w-4">{index + 1}</span>
                        <span className="text-sm select-none leading-none">{habit.icon}</span>
                        <span className="text-[12px] font-bold text-slate-700 truncate">{habit.name}</span>
                      </div>
                      
                      <div className="flex items-center space-x-3 w-[150px] justify-end">
                        {/* Micro Mini Progress Bar */}
                        <div className="w-20 bg-slate-100 h-1.5 rounded-full overflow-hidden hidden sm:block">
                          <div 
                            className="bg-emerald-400 h-full rounded-full transition-all duration-500"
                            style={{ width: `${habit.successRate}%` }}
                          ></div>
                        </div>
                        <span className={`text-[11px] font-extrabold tabular-nums px-2 py-0.5 rounded-md ${
                          habit.successRate > 75 
                            ? 'bg-emerald-50 text-emerald-600' 
                            : habit.successRate > 40 
                            ? 'bg-amber-50 text-amber-600' 
                            : 'bg-rose-50/70' + ' text-rose-500'
                        }`}>
                          {habit.successRate}%
                        </span>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

          </main>

          {/* Quick Add Habit Modal Bottom Sheet */}
          {isAddingHabit && (
            <div className="absolute inset-0 bg-black/40 backdrop-blur-xs flex items-end justify-center z-20">
              <div className="w-full bg-white rounded-t-[30px] p-6 space-y-4 shadow-xl transition-all duration-300 max-w-[430px]">
                <div className="flex justify-between items-center">
                  <h3 className="text-lg font-bold font-serif text-slate-800">Add a New Daily Intention</h3>
                  <button 
                    onClick={() => setIsAddingHabit(false)} 
                    className="w-7 h-7 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 font-bold text-sm"
                  >
                    ✕
                  </button>
                </div>
                
                <form onSubmit={handleAddHabit} className="space-y-4">
                  <div>
                    <label className="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">
                      Choose Motif Icon
                    </label>
                    <div className="flex space-x-2 overflow-x-auto py-1.5">
                      {['✨', '📖', '💪', '🥗', '💧', '☀️', '📱', '🇪🇸', '🧘', '🍵', '🧹', '🚶', '🌱'].map((emoji) => (
                        <button
                          type="button"
                          key={emoji}
                          onClick={() => setNewHabitEmoji(emoji)}
                          className={`w-10 h-10 rounded-full flex items-center justify-center text-lg shrink-0 transition-transform ${
                            newHabitEmoji === emoji ? 'bg-indigo-100 border-2 border-indigo-500 scale-115' : 'bg-slate-50 hover:bg-slate-100'
                          }`}
                        >
                          {emoji}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1">
                      Habit Title
                    </label>
                    <input 
                      type="text" 
                      placeholder="e.g., Read 1 Hour, Stop Doomscrolling, Workout" 
                      value={newHabitName}
                      onChange={(e) => setNewHabitName(e.target.value)}
                      maxLength="30"
                      className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 font-semibold text-slate-800"
                      required
                    />
                  </div>

                  <button 
                    type="submit" 
                    className="w-full bg-slate-900 text-white font-bold py-3.5 rounded-xl hover:bg-slate-800 transition-colors shadow-md text-sm"
                  >
                    Commit Habit
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* About & Settings Modal Box */}
          {showInfoModal && (
            <div className="absolute inset-0 bg-black/40 backdrop-blur-xs flex items-center justify-center p-4 z-20">
              <div className="w-full max-w-[340px] bg-white rounded-3xl p-5 space-y-4 shadow-xl">
                <div className="text-center">
                  <span className="text-4xl block mb-2 select-none">⚙️</span>
                  <h3 className="text-lg font-bold font-serif text-slate-800">Trackkar Settings</h3>
                  <p className="text-[11px] uppercase tracking-wider font-extrabold text-slate-400">Pristine Tracker Console</p>
                </div>
                
                <div className="space-y-3 text-xs text-slate-600 leading-relaxed">
                  <div className="bg-slate-50 p-3 rounded-xl border border-slate-100 text-center">
                    <p className="font-semibold text-slate-800">🎯 Clean Slate Mode Enabled</p>
                    <p className="mt-1">All face/fake values have been completely removed. Stats calculate automatically ONLY as you complete actual habits.</p>
                  </div>
                  
                  <div className="space-y-1">
                    <p className="font-semibold text-slate-800">Quick Actions:</p>
                    <ul className="space-y-1 list-none pl-0">
                      <li>• Click column headers to set Focus Day stats</li>
                      <li>• Change weeks 1–5 to view individual progress</li>
                      <li>• Hover/Swipe habit rows to access deletion</li>
                    </ul>
                  </div>
                </div>

                <div className="pt-2 space-y-2">
                  <button 
                    onClick={handleResetAllProgress}
                    className="w-full bg-rose-500 hover:bg-rose-600 text-white text-xs font-bold py-2.5 rounded-xl transition-colors shadow-xs flex items-center justify-center space-x-1"
                  >
                    <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    <span>Reset All Data to 0%</span>
                  </button>
                  
                  <button 
                    onClick={() => setShowInfoModal(false)}
                    className="w-full bg-slate-100 text-slate-700 text-xs font-bold py-2.5 rounded-xl hover:bg-slate-200 transition-colors"
                  >
                    Return to Dashboard
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
